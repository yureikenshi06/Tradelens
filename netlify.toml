[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Use esbuild to bundle functions — makes fetch available natively
[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  NODE_VERSION = "20"

[context.deploy-preview.environment]
  NODE_VERSION = "20"
